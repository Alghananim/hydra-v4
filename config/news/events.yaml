# HYDRA V4 — curated event schedule.
# Trimmed from V3's 27 events down to the 10 that actually move EUR/USD or USD/JPY.
# pip_per_sigma is the empirical pip move per 1-sigma surprise (calibrated on
# 2018-2024 EUR/USD and USD/JPY 5-min bars; numbers are conservative).
#
# Schema per event:
#   id:                stable identifier
#   name:              human label
#   currency:          USD | EUR | JPY
#   affects:           list of pairs that react
#   blackout_pre_min:  minutes before release where trading is BLACKED OUT
#   blackout_post_min: minutes after release where trading is BLACKED OUT
#   pip_per_sigma:     dict pair -> pips per 1-sigma surprise (positive)
#   tier:              1 = top-tier macro, 2 = tier-2

events:

  - id: us_nfp
    name: US Non-Farm Payrolls
    currency: USD
    affects: [EURUSD, USDJPY]
    blackout_pre_min: 5
    blackout_post_min: 30
    pip_per_sigma:
      EURUSD: 22.0
      USDJPY: 28.0
    tier: 1

  - id: us_cpi
    name: US CPI
    currency: USD
    affects: [EURUSD, USDJPY]
    blackout_pre_min: 5
    blackout_post_min: 30
    pip_per_sigma:
      EURUSD: 25.0
      USDJPY: 30.0
    tier: 1

  - id: us_fomc_decision
