  - id: eu_ecb_decision
    name: ECB Rate Decision
    currency: EUR
    affects: [EURUSD]
    blackout_pre_min: 10
    blackout_post_min: 60
    pip_per_sigma:
      EURUSD: 30.0
    tier: 1

  - id: eu_lagarde_speech
    name: ECB President Lagarde Speech
    currency: EUR
    affects: [EURUSD]
    blackout_pre_min: 2
