name: HYDRA V12 — Architect-Grade Backtest + P&L Verdict

# V12 = V2 brain redesign + 8 V12 fixes (per sub-agent council audit):
#   F1 JPY spread *10000 bug fix
#   F2 R3 grade gate split (chart-A required, vetoers can be B)
#   F3 per-pair UTC session expansion (London + Tokyo + NY) + weekend cut
#   F4 ATR-based stops (1.5x ATR)
#   F5 2:1 RR floor for targets
#   F6 persist ChartMind references in cycle records
#   F7 break-even at +1R
#   F8 trailing stop at +2R with 1.5x ATR
#
# This pipeline runs the full backtest, runs War Room, AND runs the
# rebuilt P&L simulator using V12 references — producing the honest
# verdict against the targets: ≥2 trades/day AND ≥150% return / 2y.

on:
  workflow_dispatch:
    inputs:
      time_budget_s:
        description: "Per-chunk wall-clock budget (seconds)"
        default: "300"
        type: string
      max_chunks:
        description: "Maximum chunks before giving up"
        default: "60"
        type: string
      fresh_start:
        description: "Wipe replay_runs/v12_2y/ before starting"
        default: "true"
        type: string

permissions:
  contents: write
  actions: read

jobs:
  v12_full_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with: { lfs: true }

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml

      - name: Verify cached data
        run: |
          ls -la data_cache/EUR_USD/M15/merged.jsonl
          ls -la data_cache/USD_JPY/M15/merged.jsonl
          wc -l data_cache/EUR_USD/M15/merged.jsonl data_cache/USD_JPY/M15/merged.jsonl

      - name: V12 sanity import
        run: |
          PYTHONPATH=. python - <<'PY'
          # Brain wiring sanity (same as V2) plus V12 deltas.
          from chartmind.v4 import setups_v2, multi_timeframe, news_market_integration
          from chartmind.v4.chart_thresholds import EVIDENCE_KEYS
          from chartmind.v4.references import STOP_ATR_MULT, RR_FLOOR
          from gatemind.v4.gatemind_constants import SESSION_WINDOWS_UTC, ALLOWED_GRADES
          from gatemind.v4 import session_check, consensus_check
          from replay.run_v47_backtest import _PIP_SIZE
          from replay.pnl_simulator import EntryCandidate, PnLSimulator
          assert len(EVIDENCE_KEYS) == 13
          assert STOP_ATR_MULT == 1.5
          assert RR_FLOOR == 2.0
          assert "EUR_USD" in SESSION_WINDOWS_UTC
          assert "USD_JPY" in SESSION_WINDOWS_UTC
          assert hasattr(session_check, "is_in_session")
          # Check consensus split: chart=B should fail, chart=A vetoers=B should pass.
          import inspect
          src = inspect.getsource(consensus_check.all_grades_pass)
          assert "chart_a_vetoers_b_or_better" in src or "ChartMind" in src
          # Per-pair pip
          assert _PIP_SIZE["USD_JPY"] == 0.01 and _PIP_SIZE["EUR_USD"] == 0.0001
          # PnLSimulator new params present
          sim = PnLSimulator(breakeven_at_r=1.0, trail_at_r=2.0, trail_atr_mult=1.5)
          assert sim.breakeven_at_r == 1.0 and sim.trail_at_r == 2.0
          # EntryCandidate accepts V12 references
          from datetime import datetime, timezone
          ec = EntryCandidate(
              cycle_id="x", symbol="EUR_USD",
              timestamp_utc=datetime(2024,1,1,tzinfo=timezone.utc),
              direction="BUY", session_status="in_window_london",
              invalidation_level=1.10, target_reference=1.12,
              atr_value=0.001, setup_anchor=1.105,
          )
          assert ec.invalidation_level == 1.10
          print("V12 SANITY OK — 8 fixes verified at import time")
          PY

      - name: Wipe v12 output dir if fresh_start=true
        if: ${{ inputs.fresh_start == 'true' }}
        run: |
          rm -rf replay_runs/v12_2y
          mkdir -p replay_runs/v12_2y
          echo "Wiped v12_2y for fresh baseline."

      - name: Run V12 backtest until DONE
        env:
          TIME_BUDGET_S: ${{ inputs.time_budget_s || '300' }}
          MAX_CHUNKS: ${{ inputs.max_chunks || '60' }}
        run: |
          set -e
          OUT=replay_runs/v12_2y
          CHUNK=0
          while [ ! -f "$OUT/DONE" ] ; do
            CHUNK=$((CHUNK + 1))
            if [ "$MAX_CHUNKS" != "0" ] && [ "$CHUNK" -gt "$MAX_CHUNKS" ] ; then
              echo "Hit MAX_CHUNKS=$MAX_CHUNKS without DONE; stopping."
              break
            fi
            echo "=== V12 chunk $CHUNK ==="
            PYTHONPATH=. python replay/run_v47_backtest.py \
              --output-dir "$OUT" \
              --time-budget-s "$TIME_BUDGET_S" \
              --checkpoint-every 1000
          done
          echo "--- V12 state.json ---"
          cat "$OUT/state.json" || true

      - name: Generate V12 decision_cycles.csv
        if: always()
        run: |
          PYTHONPATH=. python - <<'PY'
          import json, csv
          from pathlib import Path
          src = Path("replay_runs/v12_2y/cycles.jsonl")
          dst = Path("replay_runs/v12_2y/decision_cycles.csv")
          if not src.exists():
              print("no cycles.jsonl"); raise SystemExit(0)
          rows = []
          for line in src.open():
              line = line.strip()
              if not line: continue
              try: r = json.loads(line)
              except: continue
              if r.get("final_status") != "ENTER_CANDIDATE": continue
              chart = r.get("chart") or {}
              rows.append({
                  "cycle_id": r.get("cycle_id",""),
                  "symbol": r.get("symbol",""),
                  "timestamp_utc": r.get("timestamp_utc",""),
                  "direction": r.get("direction",""),
                  "session_status": r.get("session_status",""),
                  "invalidation_level": chart.get("invalidation_level",""),
                  "target_reference": chart.get("target_reference",""),
                  "atr_value": chart.get("atr_value",""),
                  "setup_anchor": chart.get("setup_anchor",""),
              })
          if not rows:
              print("no enter candidates"); raise SystemExit(0)
          keys = list(rows[0].keys())
          with dst.open("w", newline="", encoding="utf-8") as f:
              w = csv.writer(f); w.writerow(keys)
              for r in rows: w.writerow([r.get(k,"") for k in keys])
          print(f"wrote {len(rows)} candidates to {dst}")
          PY

      - name: Run V12 P&L simulation (real refs + BE + trail)
        if: always()
        run: |
          if [ -f "replay_runs/v12_2y/decision_cycles.csv" ]; then
            PYTHONPATH=. python -m replay.pnl_simulator \
              --decision-cycles replay_runs/v12_2y/decision_cycles.csv \
              --bars-dir data_cache \
              --granularity M15 \
              --sl-pips 10 --tp-pips 20 --slippage-pips 0.5 \
              --risk-per-trade-pct 1.0 --starting-balance 10000 \
              --output replay_runs/v12_2y/pnl_results.json || true
          fi

      - name: Run War Room
        if: always()
        run: |
          PYTHONPATH=. python -m replay.war_room.run_war_room \
            --cycles replay_runs/v12_2y/cycles.jsonl \
            --data-cache data_cache \
            --out-dir replay_runs/v12_warroom \
            --repo-root . || true

      - name: V12 verdict
        if: always()
        run: |
          PYTHONPATH=. python - <<'PY'
          import json
          from pathlib import Path
          state = Path("replay_runs/v12_2y/state.json")
          pnl = Path("replay_runs/v12_2y/pnl_results.json")
          print("=" * 60)
          print("HYDRA V12 — VERDICT")
          print("=" * 60)
          if state.exists():
              s = json.load(state.open())
              cs = s.get("counters", {})
              total = cs.get("total", 0) or 1
              enter = cs.get("ENTER_CANDIDATE", 0)
              days = total / (96 * 2)
              tpd = enter / days if days > 0 else 0
              print(f"total_cycles    = {total}")
              print(f"ENTER_CANDIDATE = {enter}")
              print(f"trades_per_day  = {tpd:.3f}   (target: 2.000)")
              print(f"target_ratio    = {tpd/2.0:.3f}")
              print()
          if pnl.exists():
              p = json.load(pnl.open())
              ov = p.get("overall", {})
              ret_pct = ov.get("net_return_pct", "N/A")
              wr = ov.get("win_rate_pct", "N/A")
              ev = ov.get("expectancy_pips", "N/A")
              print(f"net_return_pct  = {ret_pct}   (target: 150.0%)")
              print(f"win_rate_pct    = {wr}")
              print(f"EV_pips/trade   = {ev}")
              print()
              # Pass/fail
              try:
                  passed = float(ret_pct) >= 150.0 and tpd >= 2.0
                  print(f"VERDICT: {'PASS — APPROVED FOR LIVE PAPER' if passed else 'NEEDS_ITERATION'}")
              except Exception:
                  print("VERDICT: incomplete data, see logs")
          PY

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydra-v12-results
          path: |
            replay_runs/v12_2y/
            replay_runs/v12_warroom/

      - name: Commit results
        if: always()
        run: |
          git config user.name "hydra-v12-bot"
          git config user.email "hydra-v12-bot@users.noreply.github.com"
          git add replay_runs/v12_2y/state.json replay_runs/v12_2y/summary.json replay_runs/v12_2y/DONE replay_runs/v12_2y/pnl_results.json 2>/dev/null || true
          git add replay_runs/v12_warroom/*.md replay_runs/v12_warroom/*.json 2>/dev/null || true
          if git diff --cached --quiet ; then
            echo "Nothing to commit."; exit 0
          fi
          git commit -m "hydra V12 baseline: backtest + p&l + war room"
          for i in 1 2 3 4 5 ; do
            git fetch origin main
            git pull --rebase origin main || git rebase --abort || true
            if git push origin main ; then exit 0 ; fi
            sleep 10
          done
          echo "V12 push failed."; exit 1
